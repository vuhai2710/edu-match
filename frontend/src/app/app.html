@if (isAuthRoute()) {
  <router-outlet />
} @else {
  <div class="app-shell">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" routerLink="/">EduMatch</a>

        <nav class="site-nav" aria-label="Primary">
          <a routerLink="/tutors" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Tìm Gia sư</a>
          <a routerLink="/tutor-requests" routerLinkActive="active">Yêu cầu</a>
          <a href="" (click)="$event.preventDefault()">Tài liệu</a>
        </nav>

        <div class="site-actions">
          <button class="icon-button" type="button" aria-label="Thông báo">
            <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
          </button>
          <button class="icon-button" type="button" aria-label="Trò chuyện">
            <span class="material-symbols-outlined" aria-hidden="true">chat</span>
          </button>
          <button class="icon-button" type="button" [attr.aria-label]="isAuthenticated() ? 'Tài khoản' : 'Đăng nhập'">
            <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
          </button>
        </div>
      </div>
    </header>

    @if (lastApiError(); as message) {
      <section class="api-banner" aria-live="polite">
        <div>
          <strong>Lỗi API gần nhất</strong>
          <p>{{ message }}</p>
        </div>
        <button class="dismiss-button" type="button" (click)="clearApiError()">Đóng</button>
      </section>
    }

    <main class="page-shell">
      <router-outlet />
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <div class="site-footer__brand">EduMatch</div>
        <nav class="site-footer__nav" aria-label="Footer">
          <a href="" (click)="$event.preventDefault()">Về chúng tôi</a>
          <a href="" (click)="$event.preventDefault()">Liên hệ hỗ trợ</a>
          <a href="" (click)="$event.preventDefault()">Chính sách bảo mật</a>
          <a href="" (click)="$event.preventDefault()">Điều khoản dịch vụ</a>
          <a href="" (click)="$event.preventDefault()">Trở thành Gia sư</a>
        </nav>
        <div class="site-footer__copyright">© 2024 EduMatch. Đã đăng ký bản quyền.</div>
      </div>
    </footer>
  </div>
}
